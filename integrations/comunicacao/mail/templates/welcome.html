<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body style="margin:0;padding:0;background-color:#f4f4f4;font-family:Arial,sans-serif">
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background-color:#f4f4f4;padding:20px 0">
    <tr>
      <td align="center">
        <table role="presentation" width="600" cellpadding="0" cellspacing="0" style="background-color:#ffffff;border-radius:8px;overflow:hidden;border-top:4px solid #1a73e8">
          <tr>
            <td style="padding:40px 48px">
              <h1 style="margin:0 0 16px;color:#1a73e8;font-size:24px">{{title}}</h1>
              <div style="color:#333333;font-size:16px;line-height:1.6">
                {{content}}
              </div>
            </td>
          </tr>
          <tr>
            <td style="padding:24px 48px;background-color:#f8f9fa;border-top:1px solid #e9ecef">
              <p style="margin:0;color:#6c757d;font-size:12px">
                Bem-vindo(a) · supletivo.net.br
              </p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
