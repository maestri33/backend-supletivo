name: Auto-fix
# Runner efêmero: quando o CI falha num branch do DONO,
# tenta `ruff --fix`, commita, e mescla sozinho quando o CI re-rodar verde. Full auto.
# backend-supletivo: fix DETERMINISTICO (ruff) apenas — as falhas de CI aqui sao 100% ruff.
# Se a falha nao for de lint/format, comenta e para (humano decide).
#
# Guardrails (issue #5 — anti-RCE): so dispara em falha de branch != main, do repo (nao fork),
# com actor == maestri33. Loop cap impede fix->falha->fix.
on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
permissions:
  contents: write
  pull-requests: write
concurrency:
  group: autofix-${{ github.event.workflow_run.head_branch }}
  cancel-in-progress: false
jobs:
  fix:
    if: >-
      github.event.workflow_run.conclusion == 'failure' &&
      github.event.workflow_run.head_repository.full_name == 'maestri33/backend-supletivo' &&
      github.event.workflow_run.actor.login == 'maestri33' &&
      github.event.workflow_run.head_branch != 'main'
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.AGENT_GH_TOKEN }}
      GH_REPO: ${{ github.repository }}
      BR: ${{ github.event.workflow_run.head_branch }}
    steps:
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Instala uv
        run: python -m pip install uv
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_branch }}
          fetch-depth: 0
          token: ${{ secrets.AGENT_GH_TOKEN }}
      - name: ruff --fix + commit + push + label auto-merge
        run: |
          set -euo pipefail
          export PATH="$HOME/.local/bin:/usr/local/bin:$PATH"
          # loop cap: se o ultimo commit ja e do bot, nao re-tento
          if git log -1 --format='%an' | grep -q 'devagent\[bot\]'; then
            echo "ultimo commit ja e do devagent — loop cap, saindo."; exit 0
          fi
          git config user.name  "devagent[bot]"
          git config user.email "devagent@v7m.org"
          uvx ruff@0.15.14 check --fix . || true
          uvx ruff@0.15.14 format . || true
          git add -A
          if git diff --cached --quiet; then
            echo "ruff nao gerou diff — falha nao e de lint/format."
            NUM=$(gh pr list --head "$BR" --state open --json number --jq '.[0].number' 2>/dev/null || true)
            [ -n "$NUM" ] && gh pr comment "$NUM" --body "devagent: CI falhou mas nao e ruff — precisa de humano."
            exit 0
          fi
          git commit -m "style(ci): ruff auto-fix (devagent)"
          git push origin "HEAD:${BR}" --force-with-lease
          NUM=$(gh pr list --head "$BR" --state open --json number --jq '.[0].number' 2>/dev/null || true)
          if [ -n "$NUM" ]; then
            gh label create auto-merge --color 0e8a16 --description "devagent mescla no verde" 2>/dev/null || true
            gh pr edit "$NUM" --add-label auto-merge 2>/dev/null || true
            gh pr comment "$NUM" --body "devagent aplicou ruff auto-fix; mescla quando o CI ficar verde."
          fi
  merge-on-green:
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_repository.full_name == 'maestri33/backend-supletivo' &&
      github.event.workflow_run.head_branch != 'main'
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.AGENT_GH_TOKEN }}
      GH_REPO: ${{ github.repository }}
      BR: ${{ github.event.workflow_run.head_branch }}
    steps:
      - name: mescla PR com label auto-merge
        run: |
          set -euo pipefail
          NUM=$(gh pr list --head "$BR" --state open --label auto-merge --json number --jq '.[0].number' 2>/dev/null || true)
          [ -z "$NUM" ] && { echo "sem PR auto-merge pro branch $BR"; exit 0; }
          gh pr merge "$NUM" --squash --delete-branch 2>/dev/null && echo "PR #$NUM mesclado" || echo "merge nao rolou (conflito/checks pendentes)"
