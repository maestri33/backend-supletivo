name: Deploy
# CD: dispara DEPOIS do CI passar na main. O runner self-hosted (CT 30101) atualiza
# /opt/backend-supletivo pro SHA que o CI validou, checa, migra, reinicia e prova o health.
# Em FALHA: rollback de código + abre issue.
on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
concurrency:
  group: deploy-backend-v7m
  cancel-in-progress: false
permissions:
  contents: read
  issues: write
jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: [self-hosted, backend-v7m]
    steps:
      - name: SHA atual (rede de rollback)
        run: echo "PREV_SHA=$(git -C /opt/backend-supletivo rev-parse HEAD)" >> "$GITHUB_ENV"

      - name: Atualiza, checa, migra e reinicia
        run: |
          exec > >(tee /tmp/backend-deploy.log) 2>&1
          set -e
          cd /opt/backend-supletivo
          git fetch origin
          git reset --hard ${{ github.event.workflow_run.head_sha }}
          export DJANGO_SETTINGS_MODULE=core.prod_settings
          /usr/local/bin/uv sync --inexact
          /usr/local/bin/uv pip install -q gunicorn "uvicorn[standard]" "psycopg[binary]"
          .venv/bin/python manage.py check
          .venv/bin/python manage.py migrate --noinput
          .venv/bin/python manage.py collectstatic --noinput
          systemctl restart backend-web backend-qcluster
          curl -fsS -o /dev/null --retry 5 --retry-delay 2 http://127.0.0.1:8000/api/v1/clients/health
          SYSTEM_JSON=$(curl -fsS --retry 3 --retry-delay 2 \
            -H "Authorization: Bearer $STAFF_HEALTH_TOKEN" \
            http://127.0.0.1:8000/api/v1/staff/system 2>/dev/null || echo '{}')
          QCLUSTER=$(echo "$SYSTEM_JSON" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('qcluster_alive',''))" 2>/dev/null || echo "")
          if [ "$QCLUSTER" != "True" ]; then
            echo "WARN: qcluster não reportou alive — tasks assíncronas podem estar paradas"
            echo "  system response: $SYSTEM_JSON"
          fi
          echo "deploy OK @ ${{ github.event.workflow_run.head_sha }}"

      - name: Rollback de código em falha
        if: failure()
        run: |
          set -e
          cd /opt/backend-supletivo
          echo "ROLLBACK -> $PREV_SHA"
          git reset --hard "$PREV_SHA"
          /usr/local/bin/uv sync --inexact
          systemctl restart backend-web backend-qcluster
          echo "rollback feito. ATENÇÃO: migração de schema NÃO volta sozinha."

      - name: Abrir issue em falha (log sanitizado, sem gh — via API)
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          python3 - <<'PY'
          import json, os, re, urllib.request
          try:
              log = open("/tmp/backend-deploy.log").read()[-4000:]
          except OSError:
              log = "sem log capturado"
          log = re.sub(r"aact_[A-Za-z0-9:._-]+", "[REDACTED]", log)
          log = re.sub(r"(?i)(KEY|TOKEN|SECRET|PASSWORD|PASSWD)([=:]\S+)", r"\1=[REDACTED]", log)
          sha = os.environ["GITHUB_SHA"]
          run_url = f"{os.environ['GITHUB_SERVER_URL']}/{os.environ['GITHUB_REPOSITORY']}/actions/runs/{os.environ['GITHUB_RUN_ID']}"
          body = f"Workflow: {os.environ['GITHUB_WORKFLOW']}\nSHA: {sha}\nRun: {run_url}\n\n```\n{log}\n```"
          payload = json.dumps({"title": f"deploy falhou @ {sha[:7]}", "body": body, "labels": ["deploy-failure"]}).encode()
          req = urllib.request.Request(
              f"{os.environ['GITHUB_API_URL']}/repos/{os.environ['GITHUB_REPOSITORY']}/issues",
              data=payload, method="POST",
              headers={"Authorization": f"Bearer {os.environ['GH_TOKEN']}", "Accept": "application/vnd.github+json"},
          )
          try:
              r = urllib.request.urlopen(req)
              print("issue criada:", json.loads(r.read()).get("html_url"))
          except Exception as e:
              print("WARN: criar issue falhou:", e)
          PY