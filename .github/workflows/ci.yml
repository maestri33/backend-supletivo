name: CI
# Gate isolado do backend (Django+Ninja). Pull requests nunca recebem segredos reais
# nem executam código no runner de produção. O deploy continua separado e só roda após
# este workflow passar na main.
on:
  push:
    branches: [main]
  pull_request:
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true
jobs:
  check:
    runs-on: ubuntu-latest
    env:
      SECRET_KEY: ci-only-not-a-secret
      DEBUG: "0"
      APP_ENV: prod
      ALLOWED_HOSTS: localhost,127.0.0.1
      DATABASE_URL: "sqlite:///:memory:"
      ASAAS_API_KEY: ci-dummy
      INFINITEPAY_HANDLE: ci-dummy
      IA_PROVIDERS: test
      IA_TEST_BASE_URL: http://127.0.0.1:9
      IA_TEST_API_KEY: ci-dummy
      IA_FALLBACK_CHAIN: test:test-model
      WHATSAPP_API_BASE_URL: http://127.0.0.1:9
      WHATSAPP_GLOBAL_API_KEY: ci-dummy
      MAIL_SMTP_HOST: localhost
      MAIL_SMTP_USER: ci@invalid.test
      MAIL_SMTP_PASSWORD: ci-dummy
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Dependências
        run: |
          python -m pip install uv
          python -m uv sync --extra dev

      - name: System checks offline
        run: python -m uv run python manage.py check

      - name: Migrações sincronizadas com os models
        run: python -m uv run python manage.py makemigrations --check --dry-run

      - name: Lint + format (ruff pinado na versão do dev; uvx baixa sob demanda — não está no venv)
        run: |
          uvx ruff@0.15.14 check .
          uvx ruff@0.15.14 format --check .

      - name: Pytest (Wave 2 — auth, webhooks, consentimento)
        run: |
          APP_ENV=test TEST_MODE_ALLOWED_HOSTS="$(hostname)" \
            uv run pytest tests/ -v --tb=short

      - name: pip-audit
        run: |
          SITE_PACKAGES="$(uv run python -c 'import site; print(site.getsitepackages()[0])')"
          uvx pip-audit --strict --path "$SITE_PACKAGES"
